[package]
name = "bb-browser-tray"
version = "0.0.1"
description = "Windows system tray daemon UI for bb-browser"
authors = ["epiral"]
edition = "2021"
rust-version = "1.80"

[[bin]]
name = "bb-browser-tray"
path = "src/main.rs"

[dependencies]
tauri = { version = "2.0", features = ["tray-icon", "system-tray", "shell-open"] }
tauri-build = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]

[build-dependencies]
tauri-build = "2.0"
