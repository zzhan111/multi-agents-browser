display_information:
  name: 啾啾
  description: Slack bot connected to Hermes
  background_color: "#4A154B"

features:
  bot_user:
    display_name: 啾啾
    always_online: true
  app_home:
    messages_tab_read_only_enabled: false
    messages_tab_enabled: true
  shortcuts:
    - name: Run Hermes Command
      type: message
      description: Execute a Hermes command via this message

oauth_config:
  scopes:
    user:
      - channels:history
      - channels:read
      - chat:write
      - groups:history
      - groups:read
      - groups:write
      - im:history
      - im:read
      - im:write
      - mpim:history
      - pins:write
      - reactions:write
      - users:read
      - files:read
      - files:write
    bot:
      - app_mentions:read
      - channels:history
      - channels:join
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - groups:write
      - im:history
      - im:read
      - im:write
      - mpim:history
      - pins:write
      - reactions:write
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
